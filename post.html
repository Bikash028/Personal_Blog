{% extends 'base.html' %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h1>{{ post.title }}</h1>

        <p>{{ post.content }}</p>

        <hr>

        <small>
            Author: {{ post.author.username }}
        </small>

        <br><br>

        {% if current_user.is_authenticated and
              current_user.id == post.user_id %}

        <a href="{{ url_for('edit_post',
        post_id=post.id) }}"
        class="btn btn-warning">
            Edit
        </a>

        <a href="{{ url_for('delete_post',
        post_id=post.id) }}"
        class="btn btn-danger">
            Delete
        </a>

        {% endif %}

    </div>

</div>

{% endblock %}
